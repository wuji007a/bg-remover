name = "bg-remover"
compatibility_date = "2026-03-22"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# ============================================
# D1 数据库绑定
# ============================================
[[d1_databases]]
binding = "DB"
database_name = "bg-remover-db"
database_id = "ef383f96-ad10-4b86-87d4-4853e1864bc5"

# ============================================
# 非敏感的环境变量（在 wrangler.toml 中配置）
# ============================================
[vars]
# ----------------------------------------
# 背景移除 API 配置
# ----------------------------------------
BG_REMOVER_PROVIDER = "remove.bg"  # 选项: remove.bg, clipdrop
# 注意：BG_REMOVER_API_KEY 需要在 Cloudflare Pages 环境变量中配置（敏感信息）

# ----------------------------------------
# Google OAuth 配置
# ----------------------------------------
GOOGLE_CLIENT_ID = "835493865520-or4cr6o94eb0uock65d52oto4g943d2e.apps.googleusercontent.com"
GOOGLE_REDIRECT_URI = "https://bg-remover-6dp.pages.dev/api/auth/callback"
NEXT_PUBLIC_GOOGLE_CLIENT_ID = "835493865520-or4cr6o94eb0uock65d52oto4g943d2e.apps.googleusercontent.com"
NEXT_PUBLIC_GOOGLE_REDIRECT_URI = "https://bg-remover-6dp.pages.dev/api/auth/callback"
# 注意：GOOGLE_CLIENT_SECRET 需要在 Cloudflare Pages 环境变量中配置（敏感信息）

# ----------------------------------------
# PayPal 支付配置
# ----------------------------------------
PAYPAL_CLIENT_ID = "AYOsBGr8P3Yt4DRCiEXkO92MMcXSu91LFKsKZoKzL4jfD39E1EMdY-vp2nvwaoXjQUNgETUf0WG826hk"
PAYPAL_MODE = "sandbox"  # 选项: sandbox, production
PAYPAL_WEBHOOK_ID = "71P08758JG9218449"
NEXT_PUBLIC_PAYPAL_CLIENT_ID = "AYOsBGr8P3Yt4DRCiEXkO92MMcXSu91LFKsKZoKzL4jfD39E1EMdY-vp2nvwaoXjQUNgETUf0WG826hk"
NEXT_PUBLIC_PAYPAL_MODE = "sandbox"
# 注意：PAYPAL_CLIENT_SECRET 需要在 Cloudflare Pages 环境变量中配置（敏感信息）

# ----------------------------------------
# 用量控制配置
# ----------------------------------------
RATE_LIMIT_USER_PER_MINUTE = 5
RATE_LIMIT_IP_PER_MINUTE = 10
ALERT_DAILY_COST_THRESHOLD = 5
ALERT_DAILY_CALLS_THRESHOLD = 200
